services:
  site:
    container_name: bgl-site
    build: .
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NUXT_API_HOST=http://172.1.0.10
    networks:
      bgl_bglapinet:
        ipv4_address: 172.1.0.70
      default:
    restart: on-failure

  proxy:
    image: nginx:alpine
    container_name: bgl-proxy
    ports:
      - "3000:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ~/.acme.sh/anddreyko.duckdns.org_ecc:/etc/nginx/certs:ro
    depends_on:
      - site
    networks:
      default:
    restart: on-failure

networks:
  bgl_bglapinet:
    external: true
