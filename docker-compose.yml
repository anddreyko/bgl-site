services:
  site:
    container_name: bgl-site
    build: .
    ports:
      - "3000:80"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - NUXT_API_HOST=http://172.1.0.10
    networks:
      bgl_bglapinet:
        ipv4_address: 172.1.0.70
      default:
    restart: on-failure

networks:
  bgl_bglapinet:
    external: true
